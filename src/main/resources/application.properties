spring.application.name=Shadowchat
spring.jpa.database=postgresql
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

server.port=8080
jwt.secret=${JWT_SECRET}

# OpenAI
openai.api.key=${OPENAI_KEY}
openai.model=gpt-4o-mini
openai.embedding.model=text-embedding-ada-002

# Twilio
twilio.account.sid=${TWILIO_SID}
twilio.auth.token=${TWILIO_TOKEN}
twilio.whatsapp.number=whatsapp:+51910312340

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.frontend.url=${FRONTEND_URL}

app.backend.url=https://shadowchat-api-dnhsfsguffdkgzaw.brazilsouth-01.azurewebsites.net